<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小红书拼贴海报编辑器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="panel left-panel">
        <div class="brand">
          <strong>拼贴海报</strong>
          <span>1080 x 1440</span>
        </div>

        <label class="field">
          <span>输入文字</span>
          <textarea id="sourceText" rows="12">李欣妍是猪
用户现在说“是笨蛋”，意思是把“猪”换成“笨蛋”？

或者用户纠正说不是猪是笨蛋？可能用户希望把文案中的“猪”改为“笨蛋”。

让我重新生成几句话给女朋友，主语李欣妍，内容是“是笨蛋”。保持可爱、宠溺风格。

明白了，原来是“李欣妍是笨蛋”😄  </textarea>
        </label>

        <div class="button-row">
          <button id="generateBtn" class="primary">生成版式</button>
          <button id="clearBtn">清空画布</button>
        </div>

        <label class="field">
          <span>上传贴图</span>
          <input id="imageInput" type="file" accept="image/*" multiple />
        </label>

        <label class="field">
          <span>预设风格</span>
          <select id="stylePreset">
            <option value="cream">温柔奶油感</option>
            <option value="xhsCard">小红书官方卡片</option>
            <option value="japanMag">日系杂志</option>
            <option value="morandi">莫兰迪手帐</option>
            <option value="bauhaus">包豪斯重点</option>
          </select>
        </label>

        <label class="field">
          <span>默认字体</span>
          <select id="fontPreset">
            <option value="cute">圆润可爱</option>
            <option value="hand">手写松弛</option>
            <option value="serif">书卷宋体</option>
            <option value="clean">清爽黑体</option>
          </select>
        </label>

        <div class="field">
          <span>配色预设</span>
          <div id="paletteList" class="palette-list"></div>
        </div>

        <div class="button-row">
          <button id="addTextBtn">加文字</button>
          <button id="addNoteBtn">加便签</button>
        </div>

        <div class="button-row">
          <button id="saveDraftBtn">保存草稿</button>
          <button id="loadDraftBtn">载入草稿</button>
        </div>
        <input id="draftInput" type="file" accept="application/json,.json" hidden />
      </aside>

      <section class="stage-wrap">
        <div class="toolbar">
          <div class="toolbar-status">
            <span id="statusText">选择元素后可在右侧调整</span>
            <span id="pageStatus">第 1 / 1 页</span>
          </div>
          <div class="toolbar-actions">
            <button id="undoBtn" disabled title="撤销 (Ctrl+Z)">↩ 撤销</button>
            <button id="redoBtn" disabled title="重做 (Ctrl+Y)">↪ 重做</button>
            <button id="addPageBtn">加一页</button>
            <button id="exportBtn" class="primary">导出全部 PNG</button>
          </div>
        </div>
        <div class="stage-scroll">
          <div id="pages" class="pages" aria-label="海报页面"></div>
        </div>
      </section>

      <aside class="panel right-panel">
        <h2>样式</h2>
        <label class="field">
          <span>文字内容</span>
          <textarea id="editText" rows="5" disabled></textarea>
        </label>
        <label class="field">
          <span>字号</span>
          <input id="fontSize" type="range" min="14" max="72" value="32" disabled />
        </label>
        <label class="field">
          <span>宽度</span>
          <input id="boxWidth" type="range" min="100" max="520" value="420" disabled />
        </label>
        <label class="field">
          <span>小块形状</span>
          <select id="shapeSelect" disabled>
            <option value="plain-block">无底</option>
            <option value="note">便签</option>
            <option value="highlight">荧光笔</option>
            <option value="torn">撕纸</option>
            <option value="gray-strip">标题条</option>
            <option value="soft-card">圆角卡片</option>
            <option value="underline">下划线</option>
          </select>
        </label>
        <label class="field">
          <span>小块字体</span>
          <select id="elementFont" disabled>
            <option value="">跟随默认</option>
            <option value="cute">圆润可爱</option>
            <option value="hand">手写松弛</option>
            <option value="serif">书卷宋体</option>
            <option value="clean">清爽黑体</option>
          </select>
        </label>
        <div class="grid-2">
          <label class="field">
            <span>文字色</span>
            <input id="textColor" type="color" value="#171717" disabled />
          </label>
          <label class="field">
            <span>背景色</span>
            <input id="bgColor" type="color" value="#ffffff" disabled />
          </label>
        </div>
        <label class="field">
          <span>背景透明</span>
          <input id="bgAlpha" type="range" min="0" max="100" value="70" disabled />
        </label>
        <label class="field">
          <span>加粗</span>
          <input id="boldToggle" type="checkbox" disabled />
        </label>
        <div class="button-row">
          <button id="bringForward" disabled>上移层级</button>
          <button id="deleteBtn" class="danger" disabled>删除</button>
        </div>
      </aside>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
